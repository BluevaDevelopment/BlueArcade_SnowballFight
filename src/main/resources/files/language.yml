# Snowball Fight Module - English (UK)
# Only Snowball Fight-specific content

file_version: 1
display_name: "Snowball Fight"

description:
  last_standing:
    - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
    - "<green>Game</green> <gray>-</gray> <yellow><bold>Snowball Fight</bold></yellow>"
    - " "
    - "<white>Description:</white>"
    - "<gray>Shoot snowballs at your opponents to</gray>"
    - "<gray>eliminate them and be the last to survive.</gray>"
    - " "
    - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  most_kills:
    - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
    - "<green>Game</green> <gray>-</gray> <yellow><bold>Snowball Fight</bold></yellow>"
    - " "
    - "<white>Description:</white>"
    - "<gray>Score the most snowball eliminations</gray>"
    - "<gray>before time runs out to claim victory.</gray>"
    - " "
    - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

# Vote menu
vote_menu:
  name: "<green>Snowball Fight</green>"
  lore:
    - "<gray>Snowball war mini-game.</gray>"
    - "<gray>Throw snowballs to survive.</gray>"
    - ""
    - "<white>{votes}</white> <gray>votes.</gray>"

stats:

  descriptions:
    wins: "Snowball Fight wins"
    games_played: "Snowball Fight games played"
    snowballs_thrown: "Snowballs thrown in Snowball Fight"
    snowball_kills: "Players eliminated with snowballs"
    snowball_hits: "Snowball hits landed"
  labels:
    snowballs_thrown: "Snowballs thrown"
    snowball_hits: "Snowball hits"
    snowball_kills: "Snowball kills"
    games_played: "Snowball Fight games played"
    wins: "Snowball Fight wins"

messages:
  eliminated: "<red>You are out! You are now a spectator.</red>"
  deaths:
    killed_by_player:
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>nailed</gray> <red>{victim}</red> <gray>with a snowball.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>got snowed under by</gray> <yellow>{killer}</yellow><gray>.</gray>"
      - "<dark_red>✘</dark_red> <yellow>{killer}</yellow> <gray>sent</gray> <red>{victim}</red> <gray>back to the lobby.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>couldn't dodge</gray> <yellow>{killer}</yellow><gray>'s throw.</gray>"
    generic:
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>slipped away into the snow.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>vanished in a flurry.</gray>"
      - "<dark_red>✘</dark_red> <red>{victim}</red> <gray>was chilled out of the arena.</gray>"

titles:
  you_died:
    title: "<red><bold>YOU DIED</bold></red>"
    subtitle: "<gray>Better luck next time.</gray>"
  classified:
    title: "<yellow><bold>CLASSIFIED</bold></yellow>"
    subtitle: "<gray>You have been eliminated.</gray>"

scoreboard:
  mode_labels:
    last_standing: "Last Standing"
    most_kills: "Most Kills"
  last_standing:
    title: "<bold><gradient:aqua:light_purple>Blue Arcade</gradient></bold>"
    lines:
      - ""
      - "<white>Arena:</white> <aqua>{arena}</aqua>"
      - "<white>Game:</white> <aqua>Snowball Fight</aqua>"
      - "<white>Time:</white> <aqua>{time}</aqua>"
      - ""
      - "<white>Kills:</white> <red>{kills}</red>"
      - "<white>Alive:</white> <green>{alive}</green>"
      - "<white>Spectators:</white> <gray>{spectators}</gray>"
      - ""
      - "<yellow>www.blueva.net</yellow>"
  most_kills:
    title: "<bold><gradient:aqua:light_purple>Blue Arcade</gradient></bold>"
    lines:
      - ""
      - "<white>Arena:</white> <aqua>{arena}</aqua>"
      - "<white>Game:</white> <aqua>Snowball Fight</aqua>"
      - "<white>Time:</white> <aqua>{time}</aqua>"
      - ""
      - "<green>➊</green> <white>{place_1}</white> <gray>{kills_1}</gray>"
      - "<gold>➋</gold> <white>{place_2}</white> <gray>{kills_2}</gray>"
      - "<red>➌</red> <white>{place_3}</white> <gray>{kills_3}</gray>"
      - "<dark_gray>➍</dark_gray> <gray>{place_4}</gray> <dark_gray>{kills_4}</dark_gray>"
      - "<dark_gray>➎</dark_gray> <gray>{place_5}</gray> <dark_gray>{kills_5}</dark_gray>"
      - ""
      - "<white>Your Kills:</white> <red>{kills}</red>"
      - ""
      - "<yellow>www.blueva.net</yellow>"

setup_messages:
  mode_set: "{prefix} <green>Snowball Fight mode set to {mode}.</green>"
  usage_setmode: "{prefix} <yellow>Usage: /baa game <id> <minigame> setmode <last_standing|most_kills></yellow>"
